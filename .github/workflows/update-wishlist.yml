name: Update Wishlist Data

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 6am UTC
  workflow_dispatch:       # allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests beautifulsoup4 --break-system-packages

      - name: Fetch wishlist data from Steam page
        run: |
          python3 << 'EOF'
          import requests, re, json, sys

          STEAM_ID = '76561199091154546'
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36',
              'Accept-Language': 'en-US,en;q=0.9',
          }

          # Fetch the public wishlist page
          url = f'https://store.steampowered.com/wishlist/profiles/{STEAM_ID}/'
          resp = requests.get(url, headers=headers, timeout=15)
          print(f'HTTP {resp.status_code} — {len(resp.text)} bytes')

          if resp.status_code != 200:
              print('ERROR: Could not fetch wishlist page')
              sys.exit(1)

          html = resp.text

          # Steam embeds wishlist data as: var g_rgAppInfo = {...};
          match = re.search(r'var g_rgAppInfo\s*=\s*({.*?});\s*\n', html, re.DOTALL)
          if not match:
              # Try alternate variable name used in newer Steam layouts
              match = re.search(r'"wishlist_data"\s*:\s*({.*?})\s*[,}]', html, re.DOTALL)

          if not match:
              print('ERROR: Could not find wishlist data in page source.')
              print('First 500 chars of page:')
              print(html[:500])
              sys.exit(1)

          data = json.loads(match.group(1))
          count = len(data)
          print(f'SUCCESS: Found {count} wishlist items')

          with open('wishlist-data.json', 'w') as f:
              json.dump(data, f)
          EOF

      - name: Commit updated wishlist data
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add wishlist-data.json
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "Update wishlist data [skip ci]"
          git push
