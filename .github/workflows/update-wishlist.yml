name: Update Wishlist Data

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 6am UTC
  workflow_dispatch:       # allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch wishlist data from Steam
        run: |
          curl -s -L \
            -H "Accept: application/json, text/javascript, */*; q=0.01" \
            -H "Accept-Language: en-US,en;q=0.9" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" \
            -H "Referer: https://store.steampowered.com/wishlist/profiles/76561199091154546/" \
            -H "X-Requested-With: XMLHttpRequest" \
            --cookie "birthtime=-1; wants_mature_content=1; lastagecheckage=1-0-1990" \
            "https://store.steampowered.com/wishlist/profiles/76561199091154546/wishlistdata/?p=0" \
            -o wishlist-data.json

          echo "--- First 300 chars of response ---"
          head -c 300 wishlist-data.json
          echo ""

          python3 -c "
          import json, sys
          try:
              data = json.load(open('wishlist-data.json'))
              count = sum(1 for k in data if k != 'success')
              print(f'SUCCESS: Fetched {count} wishlist items')
          except Exception as e:
              print(f'ERROR parsing JSON: {e}')
              print('Steam likely returned HTML instead of JSON.')
              print('The wishlist may need to be set to Public in Steam privacy settings,')
              print('or Steam is blocking unauthenticated server requests.')
              sys.exit(1)
          "

      - name: Commit updated wishlist data
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add wishlist-data.json
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "Update wishlist data [skip ci]"
          git push
